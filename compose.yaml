services:
  livecanvas:
    build: .
    environment:
      DATABASE_URL: postgres://livecanvas:livecanvas@postgres:5432/livecanvas
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  proxy:
    image: nginx:alpine
    ports:
      - "3001:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - livecanvas
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: livecanvas
      POSTGRES_USER: livecanvas
      POSTGRES_PASSWORD: livecanvas
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U livecanvas -d livecanvas"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - livecanvas-data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  livecanvas-data:
